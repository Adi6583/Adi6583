name: Update README
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update README
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      - run: npm install
      - run: npm run update-readme
